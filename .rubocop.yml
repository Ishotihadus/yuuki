---
AllCops:
  TargetRubyVersion: 3.0
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/NumericPredicate:
  EnforcedStyle: comparison
Style/SpecialGlobalVars:
  EnforcedStyle: use_perl_names
